services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: candle-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./sessions_upload:/app/sessions_upload
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  stream:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: candle-stream
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    command: python -m candles.main stream

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: candle-agent
    volumes:
      - /tmp:/tmp
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    entrypoint: ["python", "-m", "api.agent"]

  vibe-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: candle-vibe-agent
    volumes:
      - /tmp:/tmp
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    entrypoint: ["python", "-m", "api.vibe_agent"]
